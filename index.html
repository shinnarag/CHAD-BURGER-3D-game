<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Cherry Blossom Healing Game</title>
    <link rel="stylesheet" href="style.css">

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>
</head>

<body>
    <script src="https://www.youtube.com/iframe_api"></script>

    <div id="audio-control-container" style="flex-direction: column; align-items: center;">
        <div style="display: flex; align-items: center; justify-content: center; margin-bottom: 8px; width: 100%;">
            <span style="font-size: 1.5rem; margin-right: 5px; color: white; text-shadow: 2px 2px 0 #cc5b7b; cursor: default;">🔊</span>
            <input type="range" id="volume-slider" min="0.1" max="1.0" step="0.05" value="0.4" title="Volume Control">
        </div>
        <div id="youtube-wrapper" style="border-radius: 8px; overflow: hidden; border: 2px solid white; box-shadow: 2px 2px 5px rgba(0,0,0,0.3); background: black;">
            <div id="youtube-player"></div>
        </div>
    </div>

    <div id="ui">
        <h1 id="title">Cherry Blossom Dreams</h1>
        <div id="start-screen">
            <p style="font-size: 1.5rem; color: #ffeb3b; margin-bottom: 20px;">🏆 Best Score: <span id="start-best-score">0</span></p>
            <input type="text" id="player-id" placeholder="Enter Your ID" maxlength="15" autocomplete="off" />
            <p id="instructions">Click anywhere to start walking<br>(WASD to move, SPACE to jump, Mouse to look)</p>
        </div>
        <div id="game-over-screen" class="hidden">
            <h2>Game Over</h2>
            <p>You collected <span id="final-score">0</span> stars 🌟</p>
            <div id="leaderboard-container">
                <h3>🏆 Global Leaderboard 🏆</h3>
                <ul id="leaderboard-list"></ul>
            </div>
            <p>Click to play again.</p>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div id="score-display">🌟 <span id="score">0</span></div>
        <div id="combo-display" class="hidden"><span id="combo">0</span> Combo!</div>
        <div id="lives-display">
            <span id="life-1" class="heart">❤️</span>
            <span id="life-2" class="heart">❤️</span>
            <span id="life-3" class="heart">❤️</span>
        </div>
        <button id="btn-quit" class="mobile-only">Quit</button>
        <div id="mobile-controls" class="mobile-only">
            <button id="btn-left">◀ 좌측</button>
            <button id="btn-jump">점프 ⬆</button>
            <button id="btn-right">우측 ▶</button>
        </div>
    </div>

    <!-- Loading Screen -->
    <div id="loading" class="overlay">
        <h2>Loading...</h2>
    </div>

    <script type="module" src="./src/main.js"></script>
</body>

</html>
